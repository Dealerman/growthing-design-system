<!doctype html>
<html><head><meta charset="utf-8"><title>Graphic Motifs</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <div style="background:#fff;border:1px solid #EDEDED;height:140px;overflow:hidden;position:relative;"><img src="../assets/graphic-chevron-pink.png" style="position:absolute;right:-10px;top:-10px;height:180px;"></div>
    <div style="background:#fff;border:1px solid #EDEDED;height:140px;overflow:hidden;position:relative;"><img src="../assets/graphic-triangle-pink.png" style="position:absolute;right:0;top:0;height:140px;"></div>
    <div style="background:#fff;border:1px solid #EDEDED;height:140px;display:flex;align-items:center;justify-content:center;"><img src="../assets/graphic-gradient-bar.png" style="width:90%;height:12px;object-fit:cover;"></div>
    <div style="background:#fff;border:1px solid #EDEDED;height:140px;overflow:hidden;position:relative;"><img src="../assets/graphic-diagonal-line.png" style="position:absolute;right:10px;top:0;height:140px;"></div>
  </div>
  <div class="meta" style="margin-top:10px;">Chevron · Triangle wedge · Gradient bar · Diagonal line — bleed from slide corners; never contained in frames.</div>
</div>
</body></html>
