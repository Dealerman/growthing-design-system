<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
    <div>
      <div class="swatch" style="background:#FF0084;"></div>
      <div class="label">Magenta</div>
      <div class="hex">#FF0084 · brand</div>
    </div>
    <div>
      <div class="swatch" style="background:#000000;"></div>
      <div class="label">Black</div>
      <div class="hex">#000000 · ink</div>
    </div>
    <div>
      <div class="swatch bordered" style="background:#FFFFFF;"></div>
      <div class="label">White</div>
      <div class="hex">#FFFFFF · paper</div>
    </div>
    <div>
      <div class="swatch" style="background:#F1945B;"></div>
      <div class="label">Orange</div>
      <div class="hex">#F1945B · accent</div>
    </div>
  </div>
</div>
</body></html>
