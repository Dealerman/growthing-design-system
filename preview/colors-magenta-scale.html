<!doctype html>
<html><head><meta charset="utf-8"><title>Magenta Scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
    <div><div class="swatch bordered" style="background:#FFE6F2"></div><div class="label">50</div><div class="hex">#FFE6F2</div></div>
    <div><div class="swatch" style="background:#FFB3D6"></div><div class="label">200</div><div class="hex">#FFB3D6</div></div>
    <div><div class="swatch" style="background:#FF4DA8"></div><div class="label">400</div><div class="hex">#FF4DA8</div></div>
    <div><div class="swatch" style="background:#FF0084"></div><div class="label">Brand</div><div class="hex">#FF0084</div></div>
    <div><div class="swatch" style="background:#E50077"></div><div class="label">600</div><div class="hex">#E50077</div></div>
  </div>
</div>
</body></html>
