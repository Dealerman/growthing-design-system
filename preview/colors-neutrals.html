<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:10px;">
    <div><div class="swatch" style="background:#000"></div><div class="label">Black</div><div class="hex">#000</div></div>
    <div><div class="swatch" style="background:#0B0B0B"></div><div class="label">Ink</div><div class="hex">#0B0B0B</div></div>
    <div><div class="swatch" style="background:#1A1A1A"></div><div class="label">Graph.</div><div class="hex">#1A1A1A</div></div>
    <div><div class="swatch" style="background:#3D3D3D"></div><div class="label">Slate</div><div class="hex">#3D3D3D</div></div>
    <div><div class="swatch" style="background:#6B6B6B"></div><div class="label">Steel</div><div class="hex">#6B6B6B</div></div>
    <div><div class="swatch" style="background:#A8A8A8"></div><div class="label">Ash</div><div class="hex">#A8A8A8</div></div>
    <div><div class="swatch" style="background:#D9D9D9"></div><div class="label">Mist</div><div class="hex">#D9D9D9</div></div>
    <div><div class="swatch bordered" style="background:#F7F7F7"></div><div class="label">Paper</div><div class="hex">#F7F7F7</div></div>
  </div>
</div>
</body></html>
