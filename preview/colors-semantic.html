<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
    <div><div class="swatch" style="background:#18B26B"></div><div class="label">Success</div><div class="hex">#18B26B</div></div>
    <div><div class="swatch" style="background:#F1945B"></div><div class="label">Warning</div><div class="hex">#F1945B</div></div>
    <div><div class="swatch" style="background:#E5344E"></div><div class="label">Error</div><div class="hex">#E5344E</div></div>
    <div><div class="swatch" style="background:#2E7DE9"></div><div class="label">Info</div><div class="hex">#2E7DE9</div></div>
  </div>
</div>
</body></html>
