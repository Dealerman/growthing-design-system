<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex;gap:10px;flex-wrap:wrap;font-family:Poppins;align-items:center;">
    <span style="background:#FF0084;color:#fff;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">Nuevo</span>
    <span style="background:#000;color:#fff;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">Destacado</span>
    <span style="background:transparent;color:#000;border:1.5px solid #000;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">Outline</span>
    <span style="background:#FFE6F2;color:#E50077;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">Soft</span>
    <span style="background:#18B26B;color:#fff;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">Éxito</span>
    <span style="background:#F1945B;color:#fff;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">Aviso</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;font-family:Poppins;margin-top:14px;align-items:center;">
    <span style="background:#000;color:#fff;width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border-radius:999px;">01</span>
    <span style="background:#FF0084;color:#fff;width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border-radius:999px;">02</span>
    <span style="background:#fff;color:#FF0084;width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border-radius:999px;border:1.5px solid #FF0084;">03</span>
    <span class="meta" style="margin-left:6px;">Step bubbles (flowchart)</span>
  </div>
</div>
</body></html>
