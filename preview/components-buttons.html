<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-family:Poppins;align-items:center;">
    <button style="background:#FF0084;color:#fff;border:none;padding:14px 28px;font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;font-family:Poppins;cursor:pointer;">Contactanos</button>
    <button style="background:#000;color:#fff;border:none;padding:14px 28px;font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;font-family:Poppins;cursor:pointer;">Ver Propuesta</button>
    <button style="background:transparent;color:#000;border:1.5px solid #000;padding:12px 26px;font-weight:600;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;font-family:Poppins;cursor:pointer;">Saber Más</button>
    <button style="background:transparent;color:#FF0084;border:none;padding:14px 0;font-weight:700;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;font-family:Poppins;cursor:pointer;">Ver Más →</button>
  </div>
  <div style="display:flex;gap:12px;margin-top:16px;font-family:Poppins;align-items:center;">
    <button style="background:#FF0084;color:#fff;border:none;padding:14px 28px;font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;font-family:Poppins;border-radius:999px;cursor:pointer;">Pill CTA</button>
    <button style="background:#fff;color:#000;border:1.5px solid #000;padding:12px 24px;font-weight:600;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;font-family:Poppins;border-radius:999px;cursor:pointer;">Pill Outline</button>
    <span style="background:#FF0084;color:#fff;padding:6px 14px;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;">New</span>
  </div>
</div>
</body></html>
