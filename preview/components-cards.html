<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-family:Poppins;">
    <div style="background:#fff;border:1px solid #D9D9D9;padding:20px;">
      <div style="font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#FF0084;margin-bottom:10px;">Servicio</div>
      <div style="font-weight:800;font-size:20px;color:#000;line-height:1.2;margin-bottom:8px;">SEO Técnico y de Contenido</div>
      <div style="font-size:13px;color:#3D3D3D;line-height:1.6;">Auditoría, keyword research, on-page, off-page.</div>
    </div>
    <div style="background:#000;padding:20px;color:#fff;position:relative;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#FF0084;"></div>
      <div style="font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#FF0084;margin-bottom:10px;">Dark Variant</div>
      <div style="font-weight:800;font-size:20px;line-height:1.2;margin-bottom:8px;">Campañas Paid</div>
      <div style="font-size:13px;color:#A8A8A8;line-height:1.6;">Meta, Google, LinkedIn.</div>
    </div>
  </div>
</div>
</body></html>
