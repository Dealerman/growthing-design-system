<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex;flex-direction:column;gap:12px;font-family:Poppins;max-width:420px;">
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#000;">Email</span>
      <input type="email" placeholder="matias@growthing.info" style="border:1px solid #D9D9D9;padding:12px 14px;font-family:Poppins;font-size:14px;background:#fff;outline:none;">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#000;">Mensaje</span>
      <textarea rows="3" placeholder="Contanos sobre tu proyecto..." style="border:1px solid #D9D9D9;padding:12px 14px;font-family:Poppins;font-size:14px;resize:none;"></textarea>
    </label>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="checkbox" id="a" checked style="accent-color:#FF0084;">
      <label for="a" style="font-size:13px;color:#3D3D3D;">Quiero recibir novedades</label>
    </div>
  </div>
</div>
</body></html>
