<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;font-family:Poppins;">
    <div><div style="width:100%;height:80px;background:#FF0084;border-radius:0;"></div><div class="label">None</div><div class="hex">0 · default</div></div>
    <div><div style="width:100%;height:80px;background:#FF0084;border-radius:4px;"></div><div class="label">Sm</div><div class="hex">4px · inputs</div></div>
    <div><div style="width:100%;height:80px;background:#FF0084;border-radius:12px;"></div><div class="label">Lg</div><div class="hex">12px · rare</div></div>
    <div><div style="width:100%;height:80px;background:#FF0084;border-radius:999px;"></div><div class="label">Pill</div><div class="hex">999px · chips</div></div>
  </div>
  <div class="meta" style="margin-top:12px;">Brand leans hard-edge OR fully pill. Avoid in-between.</div>
</div>
</body></html>
