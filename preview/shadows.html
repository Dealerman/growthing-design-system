<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:36px 24px;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;font-family:Poppins;">
    <div><div style="width:100%;height:72px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06);"></div><div class="label">xs</div><div class="hex">1px subtle</div></div>
    <div><div style="width:100%;height:72px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08);"></div><div class="label">sm</div><div class="hex">cards</div></div>
    <div><div style="width:100%;height:72px;background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.10);"></div><div class="label">md</div><div class="hex">hover</div></div>
    <div><div style="width:100%;height:72px;background:#fff;box-shadow:0 8px 24px rgba(255,0,132,.28);"></div><div class="label">Brand</div><div class="hex">hero CTA</div></div>
  </div>
</div>
</body></html>
